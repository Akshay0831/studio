# Phase 2: Production Polish - CI/CD Pipeline

name: Unified Editing Studio CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd studio/backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Run unit tests
        run: |
          cd studio/backend
          pytest tests/ -v --cov=backend --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./studio/backend/coverage.xml
          flags: backend
      
      - name: Run security scan
        run: |
          cd studio/backend
          pip install bandit
          bandit -r backend/ -f json -o bandit-report.json
          bandit -r backend/ -f standard

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: studio/frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd studio/frontend
          npm ci
      
      - name: Run linter
        run: |
          cd studio/frontend
          npm run lint
      
      - name: Run type checker
        run: |
          cd studio/frontend
          npm run type-check
      
      - name: Run unit tests
        run: |
          cd studio/frontend
          npm run test:unit
      
      - name: Build frontend
        run: |
          cd studio/frontend
          npm run build

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/studio-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./studio/frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/studio-frontend:${{ github.sha }}

  deployment:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://studio.unifiedediting.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/
            k8s/deployment.yaml
            k8s/service.yaml
          images: |
            ${{ secrets.DOCKER_USERNAME }}/studio-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/studio-frontend:${{ github.sha }}
          namespace: production
      
      - name: Run health check
        run: |
          timeout 60 bash -c 'until curl -f https://studio.unifiedediting.com/health; do echo "Waiting for deployment..."; sleep 5; done'
        timeout-minutes: 1